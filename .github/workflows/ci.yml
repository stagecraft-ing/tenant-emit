name: CI

# Build + test + lint, then self-governance: run the pinned spec-spine's
# governance gates against THIS repo's own corpus (the dogfood pattern). An
# emit-only toolkit that is not itself spec-governed would be hypocritical.
#
# The single required status check is `ci-gate` (see the job at the bottom): it
# aggregates every job, so branch protection and the merge queue require just
# that one name instead of an enumerated, drift-prone list.

on:
  push:
    branches: [main]
  pull_request:
  # GitHub merge queue. Each queued PR is tested against the speculative merged
  # tree, so a green PR cannot be silently invalidated by the one ahead of it.
  # The coupling gate stays pull_request-only (it reads the PR-body waiver, which
  # merge_group does not carry); every other check runs here. INERT until a repo
  # admin enables the merge queue in branch protection.
  merge_group:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build · test · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # rust-toolchain.toml pins the exact channel (+ rustfmt, clippy).
      - name: Show toolchain
        run: rustc --version && cargo --version
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Format
        run: cargo fmt --all --check

  self_governance:
    name: self-governance (compile · index · lint · couple)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so the coupling gate can diff the PR base SHA against
          # HEAD; the default shallow clone (fetch-depth 1) leaves the base
          # commit absent and `git diff base...HEAD` fails.
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      # Root package.json pins spec-spine as a devDependency; npm ci installs it
      # from the committed package-lock.json (sha512-locked, offline-capable).
      - name: Install pinned governance toolchain
        run: npm ci
      - name: Compile registry (validation gate)
        run: npx --no-install spec-spine compile
      - name: Codebase index freshness (committed artifacts must be current)
        run: npx --no-install spec-spine index check
      - name: Conformance lint (fail on warn)
        run: npx --no-install spec-spine lint --fail-on-warn
      # The coupling gate is a PR-time gate: it joins the spec and code views and
      # refuses the *merge* when code drifts from its owning spec. It runs on
      # pull_request only. A push to main has already merged (nothing left to
      # refuse) and carries no PR body, so the Spec-Drift-Waiver line (which lives
      # in the PR description, not the squash commit) is unrecoverable there.
      - name: Coupling gate (spec/code drift)
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          echo "coupling base: $BASE -> HEAD"
          printf '%s' "${PR_BODY:-}" > /tmp/pr-body.txt
          npx --no-install spec-spine couple --base "$BASE" --head HEAD --pr-body /tmp/pr-body.txt

  # Cross-platform determinism golden for the committed governance artifacts, run
  # as a reusable workflow so the single `ci-gate` check below covers it too.
  determinism:
    name: determinism
    uses: ./.github/workflows/determinism.yml

  # The load-bearing invariant made executable: a certificate emitted by
  # `tenant-emit` MUST verify clean under the SEPARATELY-VENDED `tenant-tail`
  # verifier, and tampering an artifact MUST fail verification (exit 1). This
  # job installs the released tenant-tail from crates.io and drives the real
  # cross-tool round-trip. It is a VISIBLE skip (a loud ::warning::, never a
  # silent green) until tenant-tail is published, and becomes enforcing the
  # moment it is -- matching the repo's anti-silent-green posture elsewhere.
  roundtrip:
    name: cross-tool round-trip (emit → tenant-tail verify)
    runs-on: ubuntu-latest
    env:
      TENANT_TAIL_VERSION: '0.2.0'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Show toolchain
        run: rustc --version && cargo --version
      - name: Build tenant-emit (the emitter under test)
        run: cargo build --release --locked --bin tenant-emit
      - name: Install released tenant-tail (the verifier)
        id: verifier
        run: |
          set -uo pipefail
          if cargo install tenant-tail-cli --version "${TENANT_TAIL_VERSION}" --locked --root "$RUNNER_TEMP/tt" >/tmp/tt-install.log 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "bin=$RUNNER_TEMP/tt/bin/tenant-tail" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=round-trip skipped::tenant-tail ${TENANT_TAIL_VERSION} is not installable from crates.io yet; the cross-tool round-trip did NOT run. ci-gate passes so the unpublished verifier does not block merges, and this becomes enforcing once tenant-tail publishes. A green ci-gate here does NOT imply the round-trip ran."
            tail -n 5 /tmp/tt-install.log || true
          fi
      - name: Emit → verify clean → tamper → verify fails
        if: steps.verifier.outputs.available == 'true'
        env:
          # Fixed operator seed (matches the integration tests); any valid
          # 32-byte base64 seed works. Test-only, not a real key.
          OAP_SIGNING_KEY: 'AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8='
        run: |
          set -euo pipefail
          EMIT="target/release/tenant-emit"
          TT="${{ steps.verifier.outputs.bin }}"
          RUN="$RUNNER_TEMP/run/.factory/runs/run-ci-001"
          mkdir -p "$RUN/tenant-codegen"
          printf 'fn main(){}\n' > "$RUN/tenant-codegen/app.rs"

          "$EMIT" build-certificate "$RUN" \
            --tenant-mode \
            --signer-subject ci@tenant --signer-identity-provider github-actions \
            --stage-ids auto --require-operator-key

          echo "== verify clean (must exit 0) =="
          "$TT" verify-certificate "$RUN/governance-certificate.json" --artifact-dir "$RUN"

          echo "== tamper an artifact, then verify (must exit 1) =="
          printf 'tampered\n' > "$RUN/tenant-codegen/app.rs"
          if "$TT" verify-certificate "$RUN/governance-certificate.json" --artifact-dir "$RUN"; then
            echo "FAIL: the verifier accepted a tampered artifact"
            exit 1
          fi
          echo "round-trip OK: clean verify passed, tamper was rejected"

  # AI PR review folded into the gate (OAP spec 177 + 085 precedent). PR-only:
  # it needs PR context (number, base/head diff), so it is skipped on
  # push/merge_group/workflow_dispatch, which ci-gate treats as success.
  # Job-level pull-requests: write overrides the workflow read default (the
  # review posts a comment); only the one secret the reusable workflow actually
  # consumes (CLAUDE_CODE_OAUTH_TOKEN) is forwarded, not the full repo secret
  # set (least privilege; `secrets: inherit` would leak every other secret into
  # this job's context). A Claude API outage passes with a visible notice
  # (spec 177 resilience); an auth failure or unset secret still hard-fails.
  ai-review:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    uses: ./.github/workflows/ai-pr-review.yml

  # The single required status check for branch protection and the merge queue.
  # It aggregates every CI job, so branch protection requires just this one name
  # instead of an enumerated, drift-prone list. A skipped job (e.g. a future
  # event-gated one) counts as a pass; a failed or cancelled job fails the gate.
  ci-gate:
    name: ci-gate
    if: ${{ always() }}
    needs: [test, self_governance, determinism, roundtrip, ai-review]
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI jobs to have passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required CI job failed or was cancelled:"
          echo "  test=${{ needs.test.result }}  self_governance=${{ needs.self_governance.result }}  determinism=${{ needs.determinism.result }}  roundtrip=${{ needs.roundtrip.result }}  ai-review=${{ needs.ai-review.result }}"
          exit 1
      - name: All required CI jobs passed
        run: |
          echo "ci-gate passed: test, self_governance, determinism, roundtrip, and ai-review are all green or skipped"
