# Deploy the Docusaurus documentation site to GitHub Pages.
# The repo's Settings > Pages must be set to "GitHub Actions" as the source.
# Optional: the owner may prefer SHA-pinned action refs to match their other
# repos' policy; tag refs are fine to ship.

name: Deploy docs to GitHub Pages
on:
  push:
    branches: [main]
    paths: ['website/**', '.github/workflows/deploy-docs.yml']
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
